<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1>Sorteio Intervalo</h1>
    
    <label for="nMin">Insira um número minimo</label>
    <input type="number" id="nMin">

    <label for="nMax">Insira um número máximo</label>
    <input type="number" id="nMax">

    <button id="bt">Sortear</button>

    <div id="resultado"></div>

    <script>

        nMin, nMax, resultado;
        
        let botao=document.getElementById("bt");

        botao.addEventListener("click", ()=>{
            let vmin = Number(nMin.value);
            let vmax = Number(nMax.value);
            let r = Math.random()*(vmax-vmin)+vmin;
            
            let p = document.createElement("p");
            //p.innerHTML = Math.trunc(r);
            p.innerHTML = Math.floor(r);
            p.style.display = "inline-block";
            p.style.border = "1px, solid, black";
            p.style.borderRadius = "50%";
            p.style.padding = "10px";
            p.style.gap = "1px";
            resultado.appendChild(p);

        })

    </script>
    
</body>
</html>
