<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 4 - IMC</title>

    <style>

        body{
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

    </style>

</head>
<body>

    <h2>Calcule o seu IMC</h2>

    <label for="">Informe o seu nome</label>
    <input type="text" id="nome">
    <label for="">Informe o seu peso(kg)</label>
    <input type="number" id="peso" step="0.1">
    <label for="">Informe a sua altura(m)</label>
    <input type="number" id="altura" step="0.01">
    <button id="calcular">Calcular</button>

    <p id="resultadoIMC"></p>
    <p id="classificacao"></p>
    <img id="imgPerfil" src="4_Imagens/perfil.jpg">

    <script>

        let botaoCal = document.getElementById("calcular");

        botaoCal.addEventListener("click", ()=>{

            if(nome.value.trim() !== "" && peso.value.trim() !== "" && altura.value.trim() !== ""){

                let pesoF = parseFloat(peso.value);
                let alturaF = parseFloat(altura.value);
                let imc = pesoF/(alturaF*alturaF);

                resultadoIMC.innerHTML = "IMC = " + imc.toFixed(2);

                if(imc < 18.5){
                    classificacao.innerHTML =  "Classificação = Abaixo do Peso";

                } else if(imc >= 18.5 && imc < 24.9){
                   classificacao.innerHTML = "Classificação = Peso normal";

                } else if(imc >= 25 && imc < 29.9){
                    classificacao.innerHTML = "Classificação = Sobrepeso";

                } else if(imc >= 30 && imc < 34.9){
                    classificacao.innerHTML = "Classificação = Obesidade grau 1";

                } else if(imc >= 35 && imc < 39.){
                    classificacao.innerHTML = "Classificação = Obesidade grau 2";

                } else if(imc >= 40){
                    classificacao.innerHTML = "Classificação = Obesidade grau 3 (mórbida)";

                }

                let imcImagem = Math.floor(imc);
                let imagem = document.getElementById("imgPerfil");

                switch (true){
                    case imcImagem < 18:
                        imagem.src = "4_Imagens/abaixopeso.png";
                        break;
                    case imcImagem >= 18 && imcImagem < 25 :
                        imagem.src = "4_Imagens/normal.png";
                        break;
                    case imcImagem >= 25 && imcImagem < 30:
                        imagem.src = "4_Imagens/sobrepeso.png";
                        break;
                    case imcImagem >= 30 && imcImagem < 35:
                        imagem.src = "4_Imagens/obesidade1.png";
                        break;
                    case imcImagem >= 35 && imcImagem < 40:
                        imagem.src = "4_Imagens/obesidade2.png";
                        break;
                    case imcImagem >= 45:
                        imagem.src = "4_Imagens/obesidade3.png";
                        break;
                }
            }
        })

    </script>
    
</body>
</html>
