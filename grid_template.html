<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Template</title>

    <style>

        .container{
            display: grid;
            height: 100vh;

            grid-template-areas: "header header header"
                                 "main empty sidebar"
                                 "footer footer footer";
        }

        @media (max-width:500px) {
             .container{
            display: grid;
            height: 100vh;

            grid-template-areas: "header"
                                 "main"
                                 "empty"
                                 "sidebar"
                                 "footer";

            }
        }

        .box{
            display: flex;
            border: 1px solid black;
            border-radius: 25px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.5em;
            justify-content: center;
            align-items: center;
            box-shadow: 10px 10px 20px rgb(95, 95, 95);
        }

        #box1{
            background-color: orange;
            grid-area: header;
        }

        #box2{
            background-color: rgb(82, 163, 255);
            grid-area: main;
        }

        #box3{
            grid-area: empty;
        }

        #box4{
            background-color: rgb(255, 58, 58);
            grid-area: sidebar;
        }

        #box5{
            background-color: rgb(71, 199, 71);
            grid-area: footer;
        }

    </style>

</head>
<body>

    <div class="container">
        <div class="box" id="box1">header</div>
        <div class="box" id="box2">main</div>
        <div class="box" id="box3">empty</div>
        <div class="box" id="box4">sidebar</div>
        <div class="box" id="box5">footer</div>
    </div>
    
</body>
</html>
