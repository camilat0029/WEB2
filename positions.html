<!DOCTYPE html>
<html lang="en">
<head>
    <title>Positions</title>

    <style>
        *{
            border: 1px solid #730f86;
            margin: 0px;
            padding: 0px;
        }

        .container{
            position: static;
            border-color: #4c00ff;
            border-width: 10px;
        }

        .box{
            display: inline-block;
            width: 100px;
            height: 100px;
            border-color: aqua;
        }
        #box1{
            background-color: rgb(133, 27, 231);
            position: relative;
            top: 300px;
            left: 50px;
        }
        #box2{
            background-color: rgb(120, 39, 187);
            position: absolute;
            opacity: 0.5;
            text-align: center;
            top: 300px;
        }
        #box3{
            background-color: rgb(144, 68, 231);
            position: fixed;
            top: 0px;
            right: 0px;
        }
        #box4{
            background-color: rgb(167, 113, 230);

        }
        #box5{background-color: rgb(200, 174, 235);}
        span:last-child{background-color: #e6c8f1;}

    </style>

</head>
<body>

    <div style="height: 100px;"></div>

    <div id="container">
        <div id="box1" class="box">1</div>
        <div id="box2" class="box">2</div>
        <div id="box3" class="box">3</div>
        <div id="box4" class="box">4</div>
        <div id="box5" class="box">5</div>
        <span class="box">6</span>
    </div>

    <!--1 - Fluxo textual do HTML
            display: inline(funciona como texto, não funciona escolher o tamanho do box com width e height), 
            block, inline-block-->

    <!--2 - Position: static (POSIONA O ELEMENTO COM BASE NA POSIÇÃO ESTATICA DELE, IGNORA TOP, BOTTON...)
            Position: absolute (CRIA UMA CAMADA DE EXIBIÇÃO ADCIONAL. REFERENCIA: PRIMEIRO ANCESTRAL NÃO ESTATICO)
            Position: fixed(SE POSICIONA EM RELAÇÃO A TELA)
            top, botton, left, right-->
    
</body>
</html>
