<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 4 - Grid</title>

    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            display: grid;
            height: 873px;
            max-width: 916px;

            grid-template-rows: 1fr 1fr 8fr 1fr 1fr;
            grid-template-columns: 1fr 5fr 1fr;

            grid-template-areas: "header header header"
                "leftAside banner rightAside"
                "leftAside mainContent rightAside"
                "leftAside lowContent rightAside"
                "footer footer footer";

            gap: 8px;

        }

        @media (max-width:500px) {

            .container {
                display: grid;
                width: 100%;
                height: 873px;

                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr 1fr 8fr 1fr 1fr 1fr;


                grid-template-areas: "header"
                                     "banner"
                                     "leftAside"
                                     "mainContent"
                                     "rightAside"
                                     "lowContent"
                                     "footer";

                gap: 8px;

            }
        }

        .box {
            display: grid;
            justify-content: center;
            align-items: center;
        }

        #box1 {
            background-color: rgb(244, 227, 0);
            grid-area: header;
        }

        #box2 {
            background-color: rgb(215, 22, 22);
            grid-area: banner;
        }

        #box3 {
            background-color: rgb(58, 170, 58);
            grid-area: leftAside;
            justify-content: start;
            align-items: start;
        }

        #box4 {
            background-color: rgb(43, 163, 207);
            grid-area: mainContent;
        }

        #box5 {
            background-color: rgb(244, 227, 0);
            grid-area: rightAside;
            justify-content: start;
            align-items: start;
        }

        #box6 {
            background-color: rgb(58, 170, 58);
            grid-area: lowContent;
            justify-content: start;
            align-items: start;
        }

        #box7 {
            background-color: rgb(43, 163, 207);
            grid-area: footer;
        }

        .escrita {
            display: grid;
            text-align: center;
            width: 200px;
        }

        .leftTop {
            position: relative;
            left: 10px;
            top: 10px;
        }
    </style>


</head>

<body>

    <div class="container">
        <div class="box" id="box1"><strong>Header</strong></div>
        <div class="box" id="box2"><strong>Banner</strong></div>
        <div class="box" id="box3"><strong class="leftTop">Left Aside</strong></div>
        <div class="box" id="box4">
            <div class="escrita">
                <strong>Main Content</strong>
                <strong>Width: 916, Height: 873</strong>
            </div>


        </div>
        <div class="box" id="box5"><strong class="leftTop">Right Aside</strong></div>
        <div class="box" id="box6"><strong class="leftTop">Low Content</strong></div>
        <div class="box" id="box7"><strong>Footer</strong></div>
    </div>

</body>

</html>
