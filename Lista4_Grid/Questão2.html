<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 2 - Grid</title>

    <style>

        *{margin: 0px;}

        .container{
            display: grid;
            height: 100vh;

            grid-template-columns: 1fr 3fr;
            grid-template-rows: 1fr 4fr 1fr;

            grid-template-areas: "header header"
                                 "nav contentA"
                                 "nav footer";


        }

        .box{
            display: grid;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 3em;
            align-content: center;
            justify-content: center;
    
        }

        #box1{
            background-color: rgb(255, 0, 179);
            grid-area: header;
        }

        #box2{
            background-color: rgb(247, 255, 140);
            grid-area: nav;
        }

        #box3{
            background-color: rgb(255, 193, 78);
            grid-area: contentA;
        }

        #box4{
            background-color: rgb(110, 214, 145);
            grid-area: footer;
        }
    </style>

</head>
<body>
    
    <div class="container">
        <div class="box" id="box1">Header</div>
        <div class="box" id="box2">Nav</div>
        <div class="box" id="box3">Content</div>
        <div class="box" id="box4">Footer</div>
    </div>

</body>
</html>
