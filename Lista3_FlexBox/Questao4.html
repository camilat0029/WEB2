<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 4 - FlexBox</title>

    <style>
        * {
            margin: 0px;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
        }

        .box {
            border: 1px solid black;
            display: flex;
            background-position: center;
            width: 200px;
            border-radius: 100px;
            align-items: flex-end;
            justify-content: center;
            height: 90vh;

        }

        .box:hover {
            flex-grow: 5;
            transition: all 5s;
            align-items: flex-end;
            background-size: 1400px;
            height: 95vh;
            justify-content: flex-start;
        }

        #box_imagem1 {
            background-image: url("../Imagens/Floresta_Verde.jpg");
            background-size: 1200px;
        }

        #box_imagem2 {
            background-image: url("../Imagens/Outono.jpg");
            background-size: 1300px;
        }

        #box_imagem3 {
            background-image: url("../Imagens/Flores_Cerejeira.jpg");
            background-size: 1250px;
        }

        #box_imagem4 {
            background-image: url("../Imagens/Floresta_Neve.jpg");
            background-size: 1200px;
        }

        #box_imagem5 {
            background-image: url("../Imagens/Aurora_Boreal.jpg");
            background-size: 1100px;
        }

        .circulo {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            width: 60px;
            height: 60px;
            border-radius: 100%;
            align-content: flex-end;
            left: 35%;
        }

        span {
            font-size: 30px;
        }

        .escrita {
            font-size: 20px;
        }

        .circulo_escrita {
            position: relative;
            height: 120px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            bottom: 10px;
        }


        .div_escrita {
            color: white;
            position: relative;
            left: 20px;
            font-size: 20px;
            opacity: 0;
        }


        .box:hover .circulo{
            left: 0%;
        }
        .box:hover .circulo_escrita{
            width: 340px;
            height: 120px;
        }

        .box:hover .div_escrita {
            opacity: 1;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="box" id="box_imagem1">
            <div class="circulo_escrita">
                <div class="circulo" id="circulo1">
                    <span>☀</span>
                </div>
                <div class="div_escrita">
                    <span class="escrita"><strong>Verão</strong></span>
                    <br>
                    <span class="escrita">Floresta Verde</span>
                </div>
            </div>


        </div>

        <div class="box" id="box_imagem2">

            <div class="circulo_escrita">

                <div class="circulo">
                    <span>💧</span>
                </div>
                <div class="div_escrita">
                    <span class="escrita"><strong>Outono</strong></span>
                    <br>
                    <span class="escrita">As folhas caem</span>
                </div>

            </div>

        </div>

        <div class="box" id="box_imagem3">
            <div class="circulo_escrita">
                <div class="circulo" id="circulo3">
                    <span>🕭</span>
                </div>
                <div class="div_escrita">
                    <span class="escrita"><strong>Primavera</strong></span>
                    <br>
                    <span class="escrita">Flores de Cerejeira</span>
                </div>
            </div>


        </div>

        <div class="box" id="box_imagem4">
            <div class="circulo_escrita">
                <div class="circulo" id="circulo4">
                    <span>❆</span>
                </div>
                <div class="div_escrita">
                    <span class="escrita"><strong>Inverno</strong></span>
                    <br>
                    <span class="escrita">A bela neve</span>
                </div>

            </div>

        </div>

        <div class="box" id="box_imagem5">
            <div class="circulo_escrita">
                <div class="circulo" id="circulo5">
                    <span>🕺</span>
                </div>
                <div class="div_escrita">
                    <span class="escrita"><strong>Aurora Boreal</strong></span>
                    <br>
                    <span class="escrita">Linda para se visitar</span>
                </div>
            </div>


        </div>


    </div>



</body>

</html>
