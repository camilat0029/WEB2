<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 4 - FlexBox</title>

    <style>
        * {
            margin: 0px;
        }

        .container {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
        }

        .box {
            border: 1px solid black;
            display: flex;
            background-position: center;

        }

        #box_imagem1, #box_imagem3, #box_imagem4, #box_imagem5{
            width: 5vw;
            height: 88vh;
            border-radius: 999px;
            align-items: flex-end;
            justify-content: center;
        }

        #box_imagem1 {
            background-image: url("../Imagens/Floresta_Verde.jpg");  
            background-size: 1000px;
        }

        #box_imagem2 {
            background-image: url("../Imagens/Outono.jpg");
            border-radius: 80px;
            height: 95vh;
            width: 70vw;
            align-items: flex-end;
            background-size: 1250px;

        }

        #box_imagem3 {
            background-image: url("../Imagens/Flores_Cerejeira.jpg");
            background-size: 1150px;
        }

        #box_imagem4 {
            background-image: url("../Imagens/Floresta_Neve.jpg");
            background-size: 1000px;
        }

        #box_imagem5 {
            background-image: url("../Imagens/Aurora_Boreal.jpg");
            background-size: 1000px;
        }

        .circulo {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            width: 60px;
            height: 60px;
            border-radius: 100%;
            align-content: flex-end;

        }

        span {
            font-size: 30px;
        }

        .escrita {
            font-size: 20px;
        }

        .circulo_escrita {
            position: relative;   
            width: 340px;
            height: 120px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            bottom: 10px;

        }

        #circulo1, #circulo3, #circulo4, #circulo5 {
            position: relative;
            bottom: 15px;
        }

        .div_escrita{
            color: white;
            position: relative;
            left: 20px;
            font-size: 20px;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="box" id="box_imagem1">

            <div class="circulo" id="circulo1">
                <span>🕺</span>
            </div>

        </div>

        <div class="box" id="box_imagem2">

            <div class="circulo_escrita">

                <div class="circulo">
                    <span>❆</span>
                </div>
                <div class="div_escrita">
                    <span class="escrita"><strong>Oretemauw</strong></span>
                    <br>
                    <span class="escrita">Omuke trughte a otufta</span>
                </div>

            </div>

        </div>

        <div class="box" id="box_imagem3">

            <div class="circulo" id="circulo3">
                <span>🕭</span>
            </div>

        </div>

        <div class="box" id="box_imagem4">

            <div class="circulo" id="circulo4">
                <span>💧</span>
            </div>

        </div>

        <div class="box" id="box_imagem5">

            <div class="circulo" id="circulo5">
                <span>☀</span>
            </div>

        </div>


    </div>



</body>

</html>
