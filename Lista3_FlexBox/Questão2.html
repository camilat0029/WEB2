<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questão 2 - FlexBox</title>

    <style>
        .container {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
        }

        #layout {
            width: 350px;
            height: 600px;
            border-left: 4px solid;
            border-right: 4px solid;
            border-top: 2px solid;
            border-bottom: 2px solid;
            border-color: rgb(176, 1, 199);
            display: flex;
            flex-direction: column;
            justify-content: baseline;
            align-items: center;
        }

        .titulo {
            display: flex;
            height: 120px;
            justify-content: center;
            align-items: center;
        }

        h3 {
            color: rgb(208, 207, 207);
        }

        .boxs {
            display: flex;
            height: 180px;
            flex-direction: column;
            justify-content: space-between;
        }

        .box {
            width: 280px;
            height: 30px;
            border-radius: 5px;
            background-color: rgb(234, 232, 232);
        }

        .areaFinal {
            display: flex;
            height: 300px;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        .retangulo {
            width: 100px;
            height: 30px;
            background-color: rgb(234, 232, 232);
            border-radius: 5px;
        }

        .circulo {
            width: 75px;
            height: 75px;
            justify-content: center;
            background-color: rgb(234, 232, 232);
            border-radius: 100%;
        }
    </style>

</head>

<body>

    <div class="container">
        <div id="layout">
            <div class="titulo">
                <h3>Company Logo</h1>
            </div>

            <div class="boxs">
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
                <div class="box"></div>
            </div>

            <div class="areaFinal">
                <div class="circulo"></div>
                <br>
                <div class="retangulo"></div>
                <br>
                <br>
            </div>

        </div>
    </div>


</body>

</html>
