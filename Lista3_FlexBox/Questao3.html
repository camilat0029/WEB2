<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Questão 3 - FlexBox</title>

    <style>
        *{margin: 0px;}

        .fundo{
            display: flex;
            width: 100%;
            height: 100vh;
            align-items: center;
            justify-content: center;
            background-color: gray;
        }

        .container {
            display: flex;
            flex-direction: column;
            width: 450px;
            height: 400px;
            justify-content: space-around;
            align-items: center;
            font-family: Arial, Helvetica, sans-serif;
        }

        .box {
            width: 400px;
            display: flex;
            flex-direction: row;
            align-items: center;
            flex-grow: 1;
        }

        .circulo {
            border: 1px solid rgb(193, 193, 193);
            width: 75px;
            height: 75px;
            border-radius: 100%;
            position: relative;

        }

        #imagem1 {
            background-image: url("/Imagens/Gato_1.jpg");
            background-size: 75px;
        }

        #imagem2 {
            background-image: url("/Imagens/Gato_2.jpg");
            background-size: 75px;
        }

        #imagem3 {
            background-image: url("/Imagens/Gato_3.jpg");
            background-size: 75px;
        }

        #imagem4 {
            background-image: url("/Imagens/Gato_4.jpg");
            background-size: 80px;
        }

        .nome_info {
            position: relative;
            left: 20px;

        }

        .info {
            color: rgb(157, 157, 157);
        }

        #box-1,#box-2,#box-3 {
            border-bottom: 1px solid rgb(193, 193, 193);
        }

        span, strong {
            background-color: white;
        }

        div {
            background-color: white;
        }

    </style>
</head>

<body>

    <div class="fundo">
        <div class="container">

            <div class="box" id="box-1">

                <div id="imagem1" class="circulo"></div>
                <div class="nome_info">
                    <span class="nome"><strong>Linda Hart</strong></span>
                    <br>
                    <span class="info">6765 Shady Ln Dr</span>
                </div>

            </div>

            <div class="box" id="box-2">

                <div id="imagem2" class="circulo"></div>
                <div class="nome_info">
                    <span class="nome"><strong>Roger Medina</strong></span>
                    <br>
                    <span class="info">2420 Paddock Way</span>
                </div>

            </div>

            <div class="box" id="box-3">

                <div id="imagem3" class="circulo"></div>
                <div class="nome_info">
                    <span class="nome"><strong>Dean Sullivan</strong></span>
                    <br>
                    <span class="info">6727 Airplane Avo</span>
                </div>

            </div>

            <div class="box" id="box-4">

                <div id="imagem4" class="circulo"></div>
                <div class="nome_info">
                    <span class="nome"><strong>Elizabeth Austin</strong></span>
                    <br>
                    <span class="info">6685 Blosson Hill Rd</span>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
